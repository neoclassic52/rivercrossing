<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>川渡りパズル ～きけんな一家～</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; background:#000; }
  body {
    font-family:'DotGothic16', monospace;
    color:#fff;
    display:flex; flex-direction:column; align-items:center;
    -webkit-user-select:none; user-select:none;
    touch-action:manipulation;
  }
  #wrap { position:relative; width:100%; max-width:1024px; }
  #game {
    display:block; width:100%; aspect-ratio:16/9;
    image-rendering:pixelated;
    background:#000;
    cursor:default;
  }
  /* ===== DQ風ウィンドウ共通 ===== */
  .dqwin {
    background:#000;
    border:4px solid #fff;
    border-radius:8px;
    box-shadow:0 0 0 4px #000;
    padding:14px 18px;
    line-height:1.7;
  }
  /* ===== オーバーレイ画面 ===== */
  .overlay {
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:#000;
    z-index:10;
    text-align:center;
  }
  .overlay.hidden { display:none; }
  #titleScreen img { width:88%; max-width:820px; image-rendering:pixelated; }
  .blink { animation:blink 1s steps(2) infinite; margin-top:24px; font-size:clamp(16px,3vw,26px); letter-spacing:2px; }
  @keyframes blink { 50% { opacity:0; } }
  #howtoScreen { justify-content:flex-start; padding:12px; overflow:hidden; }
  #howtoScroll {
    flex:1; overflow-y:auto; width:min(94%,560px);
    border:4px solid #fff; border-radius:8px; background:#0a0a1e; padding:8px;
  }
  #howtoScroll img { width:100%; image-rendering:pixelated; display:block; }
  .pxbtn {
    font-family:'DotGothic16', monospace;
    font-size:clamp(15px,2.6vw,22px);
    color:#fff; background:#20204a;
    border:4px solid #fff; border-radius:6px;
    padding:10px 26px; margin:12px 6px 4px;
    cursor:pointer; letter-spacing:2px;
  }
  .pxbtn:hover { background:#3a3a7a; }
  .pxbtn:disabled { color:#666; border-color:#666; cursor:default; background:#111; }
  #loadingScreen p { font-size:clamp(14px,2.6vw,20px); }
  /* ===== 操作バー ===== */
  #controls {
    width:100%; max-width:1024px;
    display:flex; flex-wrap:wrap; justify-content:center; align-items:center;
    gap:4px; padding:8px 4px; background:#000;
  }
  #resultMsg { white-space:pre-line; font-size:clamp(15px,2.8vw,24px); margin-bottom:8px; }
  #overScreen, #clearScreen { background:rgba(0,0,0,0.82); }
</style>
</head>
<body>

<div id="wrap">
  <canvas id="game" width="1280" height="720"></canvas>

  <!-- ローディング -->
  <div id="loadingScreen" class="overlay">
    <p>いま よみこんでいます…</p>
    <p id="loadProg" style="margin-top:14px;">0 / 0</p>
  </div>

  <!-- タイトル -->
  <div id="titleScreen" class="overlay hidden">
    <img id="titleImg" alt="川渡りパズル">
    <div class="blink">- PUSH START -</div>
    <button class="pxbtn" id="btnTitleStart">スタート</button>
  </div>

  <!-- あそびかた -->
  <div id="howtoScreen" class="overlay hidden">
    <div id="howtoScroll"><img id="howtoImg" alt="あそびかた"></div>
    <button class="pxbtn" id="btnGameStart">ゲームスタート</button>
  </div>

  <!-- ゲームオーバー -->
  <div id="overScreen" class="overlay hidden">
    <div class="dqwin" style="max-width:86%;">
      <p id="resultMsg"></p>
      <p style="color:#ff6a6a; font-size:clamp(20px,4vw,34px); margin:6px 0;">ゲームオーバー</p>
    </div>
    <button class="pxbtn" id="btnRetry">リトライ</button>
  </div>

  <!-- クリア -->
  <div id="clearScreen" class="overlay hidden" style="justify-content:flex-end; padding-bottom:6%;">
    <div class="dqwin" style="max-width:86%;">
      <p style="color:#ffd76a; font-size:clamp(20px,4vw,34px);">★ ゲームクリア ★</p>
      <p id="clearMsg" style="font-size:clamp(15px,2.8vw,22px); margin-top:8px;"></p>
    </div>
    <button class="pxbtn" id="btnAgain">もういちど あそぶ</button>
  </div>
</div>

<div id="controls">
  <button class="pxbtn" id="btnGo">しゅっぱつ！</button>
  <button class="pxbtn" id="btnUndo">ひとつもどす</button>
  <button class="pxbtn" id="btnReset">さいしょから</button>
  <button class="pxbtn" id="btnSound">おと:ON</button>
  <button class="pxbtn" id="btnBgm">BGM:ON</button>
</div>

<script>
"use strict";
/* =====================================================================
   川渡りパズル ～きけんな一家～ (ファミコン風)
   画像: https://github.com/neoclassic52/rivercrossing
   ---------------------------------------------------------------------
   ※レイアウトが背景と合わない場合は下の CFG の座標を調整してください
===================================================================== */
const BASE = "https://raw.githubusercontent.com/neoclassic52/rivercrossing/main/";

const CFG = {
  W:1280, H:720,
  // 岸の立ち位置(足元座標)。左岸4+4、右岸4+4
  leftSlots : [[70,400],[165,400],[260,400],[355,400],
               [70,560],[165,560],[260,560],[355,560]],
  rightSlots: [[925,400],[1020,400],[1115,400],[1210,400],
               [925,560],[1020,560],[1115,560],[1210,560]],
  // 船
  boatLeftX:445, boatRightX:835, boatY:600, boatScale:0.62,
  // 乗船位置(船中心からのオフセット / 甲板の足元y)
  seatOffsetX:38, seatFootOffsetY:-58,
  charScale:0.52,
  dockWaitL:[400,560], dockWaitR:[880,560]   // 乗り降りの経由点
};

/* ---------------- キャラクター定義 ---------------- */
const CHARS = [
  {id:"father",   name:"ちち",   rower:true },
  {id:"mother",   name:"はは",   rower:true },
  {id:"son1",     name:"ちょうなん"},
  {id:"son2",     name:"じなん"},
  {id:"daughter1",name:"ちょうじょ"},
  {id:"daughter2",name:"じじょ"},
  {id:"maid",     name:"メイド", rower:true },
  {id:"dog",      name:"いぬ"}
];
const byId = {};
CHARS.forEach(c=>byId[c.id]=c);

/* ---------------- 画像プリロード ---------------- */
const IMG_LIST = ["background1","background2","rowboat3","gametitle",
                  "game_explanation_text_pixel_v2","family_clear_1","family_clear_2",
                  "family_clear_3","family_clear_4"];
CHARS.forEach(c=>{ for(let i=1;i<=3;i++) IMG_LIST.push(`${c.id}_${i}`); });
["father","mother","dog"].forEach(id=>{ for(let i=1;i<=3;i++) IMG_LIST.push(`${id}_angry_${i}`); });
["father","mother","son1","son2","daughter1","daughter2"].forEach(id=>{
  for(let i=1;i<=4;i++) IMG_LIST.push(`${id}_down_${i}`);
});

const IMGS = {};
function loadAll(){
  const total = IMG_LIST.length;
  let done = 0;
  const prog = document.getElementById("loadProg");
  prog.textContent = `0 / ${total}`;
  return Promise.all(IMG_LIST.map(name=>new Promise(res=>{
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = img.onerror = ()=>{ done++; prog.textContent=`${done} / ${total}`; res(); };
    img.src = BASE + name + ".png";
    IMGS[name] = img;
  })));
}

/* ---------------- サウンド (ファミコン風ビープ) ---------------- */
let audioCtx = null, soundOn = true;
function initAudio(){ if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
function beep(freq, dur=0.09, type="square", vol=0.12, when=0){
  if(!soundOn || !audioCtx) return;
  const t = audioCtx.currentTime + when;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+dur);
  o.connect(g).connect(audioCtx.destination);
  o.start(t); o.stop(t+dur+0.02);
}
const SFX = {
  select : ()=>beep(880,0.07),
  cancel : ()=>beep(392,0.09),
  ng     : ()=>{ beep(196,0.12); beep(147,0.14,"square",0.12,0.10); },
  depart : ()=>{ [523,659,784].forEach((f,i)=>beep(f,0.10,"square",0.12,i*0.09)); },
  step   : ()=>beep(1200,0.03,"square",0.05),
  row    : ()=>beep(220,0.06,"triangle",0.08),
  danger : ()=>{ [740,698,622,587,466,415].forEach((f,i)=>beep(f,0.16,"square",0.14,i*0.14)); },
  clear  : ()=>{ [523,659,784,1047,784,1047,1319].forEach((f,i)=>beep(f,0.15,"square",0.13,i*0.13)); }
};

/* ---------------- BGM ---------------- */
let bgmOn = true;
const bgm = new Audio(BASE + "gamemusic.mp3");
bgm.loop = true;
bgm.volume = 0.45;
bgm.preload = "auto";
function tryPlayBgm(){
  if(!bgmOn) return;
  bgm.play().catch(()=>{ /* 自動再生がブロックされた場合は次の操作で再試行 */ });
}
// 最初のユーザー操作で確実に再生開始(ブラウザの自動再生制限対策)
["pointerdown","keydown"].forEach(ev=>{
  document.addEventListener(ev, ()=>{ initAudio(); tryPlayBgm(); }, {once:false});
});

/* ---------------- ゲーム状態 ---------------- */
let pos = {};            // id -> "L" | "R" | "BOAT"
let boatSide = "L";      // 船がいる岸
let moves = 0;
let history = [];
let phase = "idle";      // idle | anim | danger | over | clear
let message = "";
let dangerActors = null; // {angry:[ids], downs:[ids]}
let animT0 = 0;

// 描画用の各キャラ現在座標・状態
const view = {};  // id -> {x,y,mode:"stand"|"walk"|"angry"|"down"|"hidden", walkT}

function slotOf(id, side){
  const idx = CHARS.findIndex(c=>c.id===id);
  return (side==="L" ? CFG.leftSlots : CFG.rightSlots)[idx];
}
function resetGame(){
  pos = {}; CHARS.forEach(c=>pos[c.id]="L");
  boatSide = "L"; moves = 0; history = []; phase = "idle";
  dangerActors = null;
  CHARS.forEach(c=>{
    const [x,y] = slotOf(c.id,"L");
    view[c.id] = {x,y,mode:"stand",walkT:0};
  });
  message = "ふねに のせる ひとを えらんでね\n（こげるのは ちち・はは・メイド）";
  hide("overScreen"); hide("clearScreen");
  updateButtons();
}

function boatX(){ return boatSide==="L" ? CFG.boatLeftX : CFG.boatRightX; }
function passengers(){ return CHARS.filter(c=>pos[c.id]==="BOAT").map(c=>c.id); }
function bankMembers(side){ return CHARS.filter(c=>pos[c.id]===side).map(c=>c.id); }

/* ---------------- 危険判定 ---------------- */
function checkBank(members){
  const has = id=>members.includes(id);
  const v = [];
  if(has("father") && !has("mother")){
    const ds = ["daughter1","daughter2"].filter(has);
    if(ds.length) v.push({angry:"father", downs:ds,
      msg:"かあさんが いないので\nとうさんが むすめたちを おそってしまった！"});
  }
  if(has("mother") && !has("father")){
    const ss = ["son1","son2"].filter(has);
    if(ss.length) v.push({angry:"mother", downs:ss,
      msg:"とうさんが いないので\nかあさんが むすこたちを おそってしまった！"});
  }
  if(has("dog") && !has("maid")){
    const others = members.filter(m=>m!=="dog");
    if(others.length) v.push({angry:"dog", downs:others,
      msg:"メイドが いないので\nいぬが みんなに おそいかかった！"});
  }
  return v;
}

/* ---------------- アニメーションヘルパー ---------------- */
function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }
function tween(dur, fn){
  return new Promise(res=>{
    const t0 = performance.now();
    (function step(now){
      const t = Math.min(1,(now-t0)/dur);
      fn(t);
      if(t<1) requestAnimationFrame(step); else res();
    })(performance.now());
  });
}
async function walkTo(id, tx, ty, speed=0.30){
  const v = view[id];
  const sx = v.x, sy = v.y;
  const dist = Math.hypot(tx-sx, ty-sy);
  const dur = Math.max(140, dist/speed);
  v.mode = "walk";
  let stepAcc = 0;
  const t0 = performance.now();
  await new Promise(res=>{
    (function step(now){
      const t = Math.min(1,(now-t0)/dur);
      v.x = sx + (tx-sx)*t;
      v.y = sy + (ty-sy)*t;
      v.walkT = now;
      if(now - stepAcc > 180){ SFX.step(); stepAcc = now; }
      if(t<1) requestAnimationFrame(step); else res();
    })(performance.now());
  });
  v.mode = "stand";
}

/* ---------------- 出発シーケンス ---------------- */
async function departure(){
  const ps = passengers();
  if(ps.length===0){ message="だれも のっていないよ！"; SFX.ng(); return; }
  if(!ps.some(id=>byId[id].rower)){
    message="ふねを こげる おとなが いないよ！\n（ちち・はは・メイド）"; SFX.ng(); return;
  }
  // 履歴保存(出発前の岸割り当てで保存する)
  const snap = {pos:{...pos}, boatSide, moves};
  ps.forEach(id=>snap.pos[id]=boatSide);   // 乗客は元の岸にいた扱いで記録
  history.push(snap);

  phase = "anim"; updateButtons();
  message = "しゅっぱつ！";
  SFX.depart();
  moves++;

  const from = boatSide, to = boatSide==="L"?"R":"L";
  const bx0 = boatX();
  const bx1 = from==="L" ? CFG.boatRightX : CFG.boatLeftX;

  // 船の移動(乗客は船に追従・現在のx位置順に座席を割り当て)
  const seated = [...ps].sort((a,b)=>view[a].x - view[b].x);
  const rowInt = setInterval(()=>SFX.row(), 400);
  await tween(2200, t=>{
    const e = t<0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2; // easeInOut
    const bx = bx0 + (bx1-bx0)*e;
    seated.forEach((id,i)=>{
      view[id].x = bx + (i===0?-CFG.seatOffsetX:CFG.seatOffsetX);
      view[id].y = CFG.boatY + CFG.seatFootOffsetY + Math.sin(performance.now()/180)*3;
      view[id].mode = "stand";
    });
    boatProgress = e; // 描画用
  });
  clearInterval(rowInt);
  boatSide = to; boatProgress = null;

  // 下船して岸の定位置へ
  for(const id of ps){
    pos[id] = to;
    const [tx,ty] = slotOf(id,to);
    await walkTo(id, tx, ty, 0.4);
  }

  // 危険判定(両岸)
  const violations = [...checkBank(bankMembers("L")), ...checkBank(bankMembers("R"))];
  if(violations.length){
    await playDanger(violations);
    return;
  }
  // クリア判定
  if(CHARS.every(c=>pos[c.id]==="R")){
    await playClear();
    return;
  }
  phase = "idle";
  message = "ふねに のせる ひとを えらんでね";
  updateButtons();
}

let boatProgress = null;

/* ---------------- 危険演出 ---------------- */
async function playDanger(violations){
  phase = "danger"; updateButtons();
  const angryIds = [], downIds = [];
  violations.forEach(v=>{
    if(!angryIds.includes(v.angry)) angryIds.push(v.angry);
    v.downs.forEach(d=>{ if(!downIds.includes(d)) downIds.push(d); });
  });
  dangerActors = {angry:angryIds, downs:downIds};
  message = violations[0].msg;
  SFX.danger();
  animT0 = performance.now();
  await wait(2800);
  phase = "over";
  document.getElementById("resultMsg").textContent =
    violations.map(v=>v.msg).join("\n");
  show("overScreen");
}

/* ---------------- クリア演出 ---------------- */
async function playClear(){
  phase = "clear"; updateButtons();
  message = "";
  SFX.clear();
  animT0 = performance.now();
  await wait(1200);
  document.getElementById("clearMsg").textContent =
    `かぞく ぜんいん ぶじに わたれた！\nふねを こいだ かいすう：${moves}かい`;
  show("clearScreen");
}

/* ---------------- 入力 ---------------- */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;

canvas.addEventListener("click", ev=>{
  if(phase!=="idle") return;
  const r = canvas.getBoundingClientRect();
  const mx = (ev.clientX-r.left) * CFG.W/r.width;
  const my = (ev.clientY-r.top ) * CFG.H/r.height;
  // 上に描かれているものを優先するため逆順に判定
  for(let i=CHARS.length-1;i>=0;i--){
    const c = CHARS[i];
    const p = pos[c.id];
    if(p!==boatSide && p!=="BOAT") continue;   // 船と同じ岸 or 乗船中のみ操作可
    const b = hitBox(c.id);
    if(mx>=b.x && mx<=b.x+b.w && my>=b.y && my<=b.y+b.h){
      toggleBoard(c.id);
      return;
    }
  }
});

function hitBox(id){
  const img = IMGS[`${id}_1`];
  const s = CFG.charScale;
  const v = view[id];
  const w = img.width*s, h = img.height*s;
  return {x:v.x-w/2-6, y:v.y-h-6, w:w+12, h:h+12};
}

async function toggleBoard(id){
  if(pos[id]==="BOAT"){
    // 降りる
    SFX.cancel();
    pos[id] = boatSide;
    phase = "anim"; updateButtons();
    const [tx,ty] = slotOf(id, boatSide);
    await walkTo(id, tx, ty, 0.45);
    phase = "idle"; updateButtons();
  }else{
    if(passengers().length>=2){ message="ふねには ふたりまでしか のれないよ！"; SFX.ng(); return; }
    SFX.select();
    pos[id] = "BOAT";
    phase = "anim"; updateButtons();
    const seatIdx = passengers().indexOf(id);
    const wx = (boatSide==="L"?CFG.dockWaitL:CFG.dockWaitR);
    await walkTo(id, wx[0], wx[1], 0.45);
    const tx = boatX() + (seatIdx===0?-CFG.seatOffsetX:CFG.seatOffsetX);
    const ty = CFG.boatY + CFG.seatFootOffsetY;
    await walkTo(id, tx, ty, 0.45);
    phase = "idle";
    message = "「しゅっぱつ！」で ふねを こぐよ";
    updateButtons();
  }
}

/* ---------------- 描画 ---------------- */
function drawChar(id, now){
  const v = view[id];
  if(v.mode==="hidden") return;
  let img;
  if(phase==="danger" && dangerActors){
    if(dangerActors.angry.includes(id)){
      const f = 1 + Math.floor((now-animT0)/260)%3;
      img = IMGS[`${id}_angry_${f}`];
    }else if(dangerActors.downs.includes(id)){
      const f = 1 + Math.floor((now-animT0)/220)%4;
      img = IMGS[`${id}_down_${f}`];
    }
  }
  if(!img){
    const seq = [1,2,3,2];
    if(v.mode==="walk"){
      const f = seq[Math.floor(now/140)%4];
      img = IMGS[`${id}_${f}`];
    }else{
      // 立ち: ゆっくり足踏み(キャラごとに少しタイミングをずらす)
      const offset = CHARS.findIndex(c=>c.id===id)*90;
      const f = seq[Math.floor((now+offset)/260)%4];
      img = IMGS[`${id}_${f}`];
    }
  }
  const s = CFG.charScale;
  const w = img.width*s, h = img.height*s;
  ctx.drawImage(img, v.x-w/2, v.y-h, w, h);

  // 名前タグ(選択できるキャラのみ)
  if(phase==="idle" && (pos[id]===boatSide || pos[id]==="BOAT")){
    ctx.font = "16px DotGothic16, monospace";
    ctx.textAlign = "center";
    ctx.fillStyle = pos[id]==="BOAT" ? "#ffd76a" : "#fff";
    ctx.strokeStyle = "#000"; ctx.lineWidth = 3;
    const label = byId[id].name + (pos[id]==="BOAT"?" ▲":"");
    ctx.strokeText(label, v.x, v.y+20);
    ctx.fillText(label, v.x, v.y+20);
  }
}

function drawMessageWindow(){
  if(!message) return;
  const mw = 700, mh = 92, mx = (CFG.W-mw)/2, my = CFG.H-mh-12;
  ctx.fillStyle = "#000";
  ctx.fillRect(mx,my,mw,mh);
  ctx.strokeStyle = "#fff"; ctx.lineWidth = 4;
  ctx.strokeRect(mx+3,my+3,mw-6,mh-6);
  ctx.font = "22px DotGothic16, monospace";
  ctx.fillStyle = "#fff"; ctx.textAlign = "center";
  message.split("\n").forEach((line,i)=>{
    ctx.fillText(line, CFG.W/2, my+36+i*30);
  });
}

function drawHUD(){
  ctx.font = "20px DotGothic16, monospace";
  ctx.textAlign = "left";
  ctx.fillStyle = "#000";
  ctx.fillRect(12,12,190,40);
  ctx.strokeStyle="#fff"; ctx.lineWidth=3;
  ctx.strokeRect(14,14,186,36);
  ctx.fillStyle = "#fff";
  ctx.fillText(`こいだ かいすう:${moves}`, 24, 40);
}

function render(now){
  ctx.clearRect(0,0,CFG.W,CFG.H);
  // 背景(2枚を交互に切り替えて水面をアニメーション)
  const bgf = Math.floor(now/450)%2 + 1;
  ctx.drawImage(IMGS[`background${bgf}`], 0,0, CFG.W, CFG.H);

  // 船
  const bimg = IMGS.rowboat3;
  const bs = CFG.boatScale;
  const bw = bimg.width*bs, bh = bimg.height*bs;
  let bx = boatX();
  if(boatProgress!==null){
    const x0 = boatSide==="L"?CFG.boatLeftX:CFG.boatRightX;
    const x1 = boatSide==="L"?CFG.boatRightX:CFG.boatLeftX;
    bx = x0 + (x1-x0)*boatProgress;
  }
  const bob = Math.sin(now/300)*4;
  ctx.drawImage(bimg, bx-bw/2, CFG.boatY-bh/2+bob, bw, bh);

  // キャラ(y座標順に描画して手前が上に来るように)
  const order = [...CHARS].sort((a,b)=>view[a.id].y - view[b.id].y);
  order.forEach(c=>drawChar(c.id, now));

  // クリア演出
  if(phase==="clear"){
    const f = 1 + Math.floor((now-animT0)/450)%4;
    const img = IMGS[`family_clear_${f}`];
    const scale = Math.min(760/img.width, 340/img.height);
    const w = img.width*scale, h = img.height*scale;
    ctx.drawImage(img, (CFG.W-w)/2, 340-h/2, w, h);
  }

  drawHUD();
  drawMessageWindow();
  requestAnimationFrame(render);
}

/* ---------------- ボタン・画面制御 ---------------- */
function show(id){ document.getElementById(id).classList.remove("hidden"); }
function hide(id){ document.getElementById(id).classList.add("hidden"); }

const btnGo = document.getElementById("btnGo");
const btnUndo = document.getElementById("btnUndo");
const btnReset = document.getElementById("btnReset");

function updateButtons(){
  const idle = phase==="idle";
  btnGo.disabled = !idle;
  btnUndo.disabled = !idle || history.length===0;
  btnReset.disabled = phase==="anim";
}

btnGo.onclick = ()=>{ initAudio(); if(phase==="idle") departure(); };
btnUndo.onclick = ()=>{
  if(phase!=="idle" || !history.length) return;
  initAudio(); SFX.cancel();
  const snap = history.pop();
  pos = {...snap.pos}; boatSide = snap.boatSide; moves = snap.moves;
  CHARS.forEach(c=>{
    const [x,y] = slotOf(c.id, pos[c.id]);
    view[c.id] = {x,y,mode:"stand",walkT:0};
  });
  message = "ひとつ もどしたよ";
  updateButtons();
};
btnReset.onclick = ()=>{ initAudio(); SFX.cancel(); resetGame(); };
document.getElementById("btnSound").onclick = function(){
  soundOn = !soundOn;
  this.textContent = soundOn ? "おと:ON" : "おと:OFF";
  if(soundOn){ initAudio(); SFX.select(); }
};
document.getElementById("btnBgm").onclick = function(){
  bgmOn = !bgmOn;
  this.textContent = bgmOn ? "BGM:ON" : "BGM:OFF";
  if(bgmOn){ tryPlayBgm(); } else { bgm.pause(); }
};
document.getElementById("btnRetry").onclick = ()=>{ SFX.select(); resetGame(); };
document.getElementById("btnAgain").onclick = ()=>{ SFX.select(); resetGame(); };
document.getElementById("btnTitleStart").onclick = ()=>{
  initAudio(); SFX.select();
  hide("titleScreen"); show("howtoScreen");
};
document.getElementById("btnGameStart").onclick = ()=>{
  initAudio(); SFX.depart();
  hide("howtoScreen");
  resetGame();
};

/* ---------------- 起動 ---------------- */
loadAll().then(()=>{
  document.getElementById("titleImg").src = IMGS.gametitle.src;
  document.getElementById("howtoImg").src = IMGS.game_explanation_text_pixel_v2.src;
  hide("loadingScreen"); show("titleScreen");
  resetGame();
  requestAnimationFrame(render);
});
</script>
